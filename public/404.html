<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Powerlaw</title>
    <script>
      // GitHub Pages SPA redirect
      // Converts path to query string so index.html can restore it
      var repo = '/Powerlaw';
      var path = window.location.pathname;
      if (path.startsWith(repo)) {
        path = path.slice(repo.length);
      }
      // Skip redirect for static files (e.g. .html, .css, .js)
      if (path.indexOf('.') === -1) {
        window.location.replace(
          repo + '/?p=' + encodeURIComponent(path) + window.location.search.replace('?', '&') + window.location.hash
        );
      }
    </script>
  </head>
  <body></body>
</html>
